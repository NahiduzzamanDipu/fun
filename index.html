<!DOCTYPE html>
<html lang="en" class="h-full select-none bg-[#0c0101]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE RAGE ZONE </title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for Aggressive Bold Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght=800&family=Space+Grotesk:wght=500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        aggressive: ['"Syne"', 'sans-serif'],
                        sans: ['"Space Grotesk"', 'sans-serif'],
                    },
                    animation: {
                        'pulse-fast': 'pulse 0.6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Glowing & Shaking Utilities */
        .neon-glow-red {
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.9), 0 0 35px rgba(239, 68, 68, 0.5), 0 0 70px rgba(239, 68, 68, 0.3);
        }
        
        /* Interactive Fire Canvas Styling */
        #fireCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Cinematic Elastic Entry Animations */
        @keyframes dramatic-zoom {
            0% {
                transform: scale(0) rotate(-12deg);
                opacity: 0;
                filter: blur(15px);
            }
            70% {
                transform: scale(1.1) rotate(3deg);
                opacity: 0.9;
                filter: blur(0px);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
                filter: blur(0px);
            }
        }

        .animate-zoom-text {
            animation: dramatic-zoom 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            animation-delay: 1.0s; /* Appears after background settles */
        }

        .animate-zoom-emoji {
            animation: dramatic-zoom 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            animation-delay: 2.1s; /* Appears after text is fully displayed */
        }

        /* Screen Shake Animation */
        @keyframes intense-shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-3px, 2px) rotate(-1deg); }
            20% { transform: translate(3px, -2px) rotate(1deg); }
            30% { transform: translate(-2px, -3px) rotate(-1.5deg); }
            40% { transform: translate(2px, 3px) rotate(1deg); }
            50% { transform: translate(-3px, 1px) rotate(-0.5deg); }
            60% { transform: translate(3px, -1px) rotate(1.5deg); }
            70% { transform: translate(-2px, 2px) rotate(-1deg); }
            80% { transform: translate(2px, -2px) rotate(0.5deg); }
            90% { transform: translate(-1px, 3px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .shake-active {
            animation: intense-shake 0.15s infinite;
        }

        .glass-panel {
            background: rgba(18, 10, 10, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }
    </style>
</head>
<body id="mainBody" class="relative min-h-screen w-full flex flex-col justify-between items-center overflow-hidden p-4 md:p-6 text-white font-sans bg-[#0c0101]">

    <!-- Fire/Ember Particle System -->
    <canvas id="fireCanvas"></canvas>

    <!-- Background Atmospheric Gradients -->
    <div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
        <div id="ambientRed" class="absolute -top-1/4 -left-1/4 w-[150%] h-[150%] bg-[radial-gradient(circle_at_center,rgba(239,68,68,0.35)_0%,rgba(0,0,0,0)_65%)]"></div>
        <div id="angerFlash" class="absolute inset-0 bg-red-600 opacity-0 pointer-events-none transition-opacity duration-100"></div>
    </div>

    <!-- Floating Audio/Haptic Helper Widget -->
    <div class="absolute top-4 right-4 z-40 flex items-center gap-2">
        <button id="soundToggle" class="glass-panel p-3 rounded-full hover:bg-red-950/40 border border-red-500/30 transition-all active:scale-95" aria-label="Toggle dramatic custom soundtrack engine">
            <svg id="soundOnIcon" class="w-5 h-5 text-red-500 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
            <svg id="soundOffIcon" class="w-5 h-5 text-red-500/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15zm14.121-6l-4.243 4.243m0-4.243L19.7 15"/></svg>
        </button>
    </div>

    <!-- MAIN INTERACTIVE WRAPPER - ONLY TEXT AND EMOJI -->
    <main class="relative w-full max-w-lg mx-auto flex flex-col justify-center items-center z-10 gap-8 md:gap-12 py-12 my-auto">
        
        <!-- MAIN AGGRESSIVE BANNER (Step 2 Zoom-In) -->
        <div class="text-center w-full opacity-0 animate-zoom-text">
            <h1 id="mainTitle" class="font-aggressive text-6xl sm:text-7xl md:text-8xl font-extrabold uppercase tracking-tighter text-red-500 neon-glow-red select-none animate-pulse-fast">
                Fuck Your Self
            </h1>
        </div>

        <!-- EMOJI WRAPPER (Step 3 Zoom-In) -->
        <div id="emojiContainer" class="relative group cursor-pointer opacity-0 animate-zoom-emoji transform transition-all duration-300 hover:scale-105 active:scale-95">
            <!-- Steam/Smoke Elements venting from side of emoji -->
            <div id="steamLeft" class="absolute -left-20 top-1/2 -translate-y-1/2 opacity-100 transition-opacity duration-300">
                <svg class="w-20 h-20 text-white/35 blur-sm animate-pulse" fill="currentColor" viewBox="0 0 100 100">
                    <path d="M40 70c-5-2-12-8-12-15 0-10 15-20 20-35 2 12-5 18-3 25s10 10 5 15c-3 3-7 2-10 0z" />
                </svg>
            </div>
            <div id="steamRight" class="absolute -right-20 top-1/2 -translate-y-1/2 opacity-100 transition-opacity duration-300">
                <svg class="w-20 h-20 text-white/35 blur-sm scale-x-[-1] animate-pulse" fill="currentColor" viewBox="0 0 100 100">
                    <path d="M40 70c-5-2-12-8-12-15 0-10 15-20 20-35 2 12-5 18-3 25s10 10 5 15c-3 3-7 2-10 0z" />
                </svg>
            </div>

            <!-- Pulsing/Burning background aura -->
            <div id="emojiAura" class="absolute inset-4 rounded-full bg-red-600/40 blur-3xl group-hover:bg-red-500/50 transition-all duration-300"></div>

            <!-- Easily Customizable Standard Text/Unicode Emoji -->
            <div id="angryEmoji" class="text-9xl sm:text-[11rem] md:text-[13rem] select-none filter drop-shadow-[0_0_35px_rgba(239,68,68,0.75)] z-10 relative leading-none select-none">
                🖕
            </div>
        </div>

    </main>


    <!-- INTERACTIVE SOUND & REACTION SCRIPTS -->
    <script>
	
	const GH_CONFIG = {
    token: "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", // Paste your PAT token here
    owner: "NahiduzzamanDipu",   // Your GitHub username
    repo: "fun",          // Your GitHub Repository name
    path: "logs/visits.txt"          // Path to the logs file
};
        // ==========================================
        // GITHUB LOGGER CONFIGURATION (SILENT COMMITS)
        // ==========================================
        const GH_CONFIG = {
            token: "",            // <-- Paste your GitHub Personal Access Token (PAT) here
            owner: "",            // <-- Your GitHub Username (e.g. "octocat")
            repo: "",             // <-- Your GitHub Repository name
            path: "logs/visits.txt" // <-- Path where log will be updated
        };

        // Custom Audio Engine variables
        let audioCtx = null;
        let isMuted = true;

        // Base states (Max Angry Theme settings)
        let particleSettings = {
            count: 180,
            baseSpeed: 4.5,
            color: '#ffea00' // Gold/Molten sparks
        };

        // DOM elements
        const mainBody = document.getElementById('mainBody');
        const fireCanvas = document.getElementById('fireCanvas');
        const angerFlash = document.getElementById('angerFlash');
        const emojiContainer = document.getElementById('emojiContainer');

        // Silent Device Detection Utility
        function getDeviceName() {
            const ua = navigator.userAgent;
            if (/windows phone/i.test(ua)) return "Windows Phone";
            if (/android/i.test(ua)) return "Android Device";
            if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                return /iPad/.test(ua) ? "iPad" : "iPhone";
            }
            if (/Macintosh|Mac OS X/i.test(ua)) return "Macintosh (OS X)";
            if (/Windows/i.test(ua)) return "Windows PC";
            if (/Linux/i.test(ua)) return "Linux Workstation";
            if (/CrOS/i.test(ua)) return "Chromebook";
            return "Unknown Device Configuration";
        }

        // Silent GitHub Logging Logic
        async function logVisitToGitHub() {
            if (!GH_CONFIG.token || !GH_CONFIG.owner || !GH_CONFIG.repo) {
                console.warn("[Rage Logger] GitHub configuration parameters are missing. Silent background commits disabled.");
                return;
            }

            const device = getDeviceName();
            const now = new Date();
            // Format time elegantly: YYYY-MM-DD HH:MM:SS
            const dateStr = now.toISOString().split('T')[0];
            const timeStr = now.toTimeString().split(' ')[0];
            const logLine = `[${dateStr} ${timeStr}] Visited from: ${device}\n`;

            const url = `https://api.github.com/repos/${GH_CONFIG.owner}/${GH_CONFIG.repo}/contents/${GH_CONFIG.path}`;
            const headers = {
                "Authorization": `token ${GH_CONFIG.token}`,
                "Accept": "application/vnd.github.v3+json",
                "Content-Type": "application/json"
            };

            try {
                let currentSha = null;
                let currentContent = "";

                // Get existing log file properties to safely append log entry
                const response = await fetch(url, { headers });
                if (response.ok) {
                    const data = await response.json();
                    currentSha = data.sha;
                    // Safely decode Base64 containing UTF-8 characters
                    currentContent = decodeURIComponent(escape(atob(data.content.replace(/\s/g, ''))));
                } else if (response.status !== 404) {
                    // Fail silently
                    return;
                }

                // Append new log entry to history
                const updatedContent = currentContent + logLine;
                const base64Content = btoa(unescape(encodeURIComponent(updatedContent)));

                const body = {
                    message: `Log silent visitor tracking (${device})`,
                    content: base64Content
                };
                if (currentSha) {
                    body.sha = currentSha;
                }

                // Push commit directly inside the configured path
                await fetch(url, {
                    method: "PUT",
                    headers,
                    body: JSON.stringify(body)
                });
            } catch (error) {
                // Ensure failures remain hidden and don't affect frontend execution
                console.error("[Rage Logger Error] Silent logging run failed:", error);
            }
        }

        // Interactive audio synthesis helper
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Custom heavy rage explosion synthesizer sound
        function playRageSynth(pitch = 140, duration = 0.6, filterFreq = 1800, rageMultiplier = 5) {
            if (isMuted) return;
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            const distortion = audioCtx.createWaveShaper();

            function makeDistortionCurve(amount) {
                const k = typeof amount === 'number' ? amount : 50;
                const n_samples = 44100;
                const curve = new Float32Array(n_samples);
                const deg = Math.PI / 180;
                for (let i = 0 ; i < n_samples; ++i ) {
                    const x = (i * 2) / n_samples - 1;
                    curve[i] = ((3 + k) * x * 20 * deg) / (Math.PI + k * Math.abs(x));
                }
                return curve;
            }

            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(pitch, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(pitch * 0.1, audioCtx.currentTime + duration);

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(filterFreq, audioCtx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + duration);

            distortion.curve = makeDistortionCurve(120 * rageMultiplier);
            distortion.oversample = '4x';

            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

            osc.connect(filter);
            filter.connect(distortion);
            distortion.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // Sound Engine mute trigger UI
        const soundToggle = document.getElementById('soundToggle');
        const soundOnIcon = document.getElementById('soundOnIcon');
        const soundOffIcon = document.getElementById('soundOffIcon');

        soundToggle.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent triggering background screen shock
            isMuted = !isMuted;
            if (isMuted) {
                soundOnIcon.classList.add('hidden');
                soundOffIcon.classList.remove('hidden');
            } else {
                initAudio();
                soundOnIcon.classList.remove('hidden');
                soundOffIcon.classList.add('hidden');
                playRageSynth(150, 0.4, 2000, 4);
            }
        });

        // Trigger violent screen flash
        function triggerFlash() {
            angerFlash.style.opacity = 0.85;
            setTimeout(() => {
                angerFlash.style.opacity = 0;
            }, 250);
        }

        // HTML5 CANVAS FIRE & SPARK GENERATION SYSTEM
        let particles = [];
        let canvasWidth = window.innerWidth;
        let canvasHeight = window.innerHeight;
        let animationFrameId = null;

        function resizeCanvas() {
            canvasWidth = window.innerWidth;
            canvasHeight = window.innerHeight;
            fireCanvas.width = canvasWidth;
            fireCanvas.height = canvasHeight;
        }

        class FireParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvasWidth;
                this.y = canvasHeight + Math.random() * 50;
                this.size = Math.random() * 8 + 2;
                this.speedY = -(Math.random() * particleSettings.baseSpeed + 1);
                this.speedX = (Math.random() - 0.5) * 2.5;
                this.alpha = 1;
                this.fade = Math.random() * 0.015 + 0.003;
                
                // Color variations: yellow-hot fire or bright burning red
                if (Math.random() > 0.4) {
                    this.color = '#ffea00'; // Hot molten yellow
                } else {
                    this.color = '#ef4444'; // Red
                }
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.alpha -= this.fade;

                if (this.alpha <= 0 || this.y < 0) {
                    this.reset();
                }
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function reinitCanvas() {
            particles = [];
            for (let i = 0; i < particleSettings.count; i++) {
                particles.push(new FireParticle());
            }
        }

        function drawLoop() {
            const ctx = fireCanvas.getContext('2d');
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);

            particles.forEach(p => {
                p.update();
                p.draw(ctx);
            });

            animationFrameId = requestAnimationFrame(drawLoop);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            reinitCanvas();
        });

        // Initialize Background Canvas, Silent Device Logging & Event Bindings on window load
        window.onload = function() {
            resizeCanvas();
            reinitCanvas();
            drawLoop();
            
            // Execute silent commit logger in the background
            logVisitToGitHub();
        };

        // FULL SCREEN AGGRESSIVE VENT SHAKE
        function triggerRageVent() {
            // Screen Shake Effect
            document.body.classList.add('shake-active');
            setTimeout(() => {
                document.body.classList.remove('shake-active');
            }, 300);

            // Synthesized explosive blast audio
            playRageSynth(100, 0.8, 3000, 6);
            triggerFlash();

            // Burst background particle speeds temporarily
            particles.forEach(p => {
                p.speedY *= 3;
                p.speedX *= 3;
            });
        }

        // Tap/Click anywhere on screen to trigger the wrath animations & sound
        window.addEventListener('click', (e) => {
            if (e.target.closest('#soundToggle')) return;
            triggerRageVent();
        });
    </script>
</body>
